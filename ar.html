<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Surprise</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #000;
      overflow: hidden
    }

    #hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0, 0, 0, .8);
      color: #e8d5a3;
      padding: 12px 22px;
      border: 1px solid rgba(201, 168, 76, .4);
      font-size: 1rem;
      font-style: italic;
      text-align: center;
      max-width: 90vw;
      font-family: Georgia, serif;
      white-space: nowrap;
    }

    #video-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      align-items: center;
      justify-content: center;
    }

    #video-popup.show {
      display: flex
    }

    #video-popup iframe {
      width: 100vw;
      height: 100vh;
      border: none
    }

    #vcls {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10000;
      background: rgba(0, 0, 0, .85);
      border: 1px solid #c9a84c;
      color: #c9a84c;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

  <div id="hint">Point camera at the photo...</div>

  <div id="video-popup">
    <button id="vcls" onclick="closeVid()">&#x2715; Close</button>
    <iframe id="yt" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: https://neel07sanghvi.github.io/birthday/landing_page.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
    color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target">
      <a-plane color="#000" opacity="0" width="1" height="1.5"></a-plane>
    </a-entity>

  </a-scene>

  <script>
    var vidOpen = false;

    function showVid() {
      if (vidOpen) return;
      vidOpen = true;
      document.getElementById("hint").textContent = "Enjoy your surprise!";
      // Use the short video ID directly in embed URL
      document.getElementById("yt").src = "https://www.youtube.com/embed/4-iGafIAVmo?autoplay=1&playsinline=1&rel=0&mute=0";
      document.getElementById("video-popup").classList.add("show");
    }

    function closeVid() {
      vidOpen = false;
      document.getElementById("yt").src = "";
      document.getElementById("video-popup").classList.remove("show");
      document.getElementById("hint").textContent = "Point camera at the photo...";
    }

    document.querySelector("a-scene").addEventListener("loaded", function () {
      var target = document.getElementById("target");
      target.addEventListener("targetFound", function () {
        showVid();
      });
      // Don't close on lost — let her watch without having to hold still
    });
  </script>

</body>

</html>
