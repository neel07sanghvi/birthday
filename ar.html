<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --gold: #c9a84c;
      --gl: #e8d5a3;
      --dark: #1a1208
    }

    html,
    body {
      min-height: 100vh;
      background: var(--dark);
      font-family: "Cormorant Garamond", serif;
      overflow-x: hidden
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 0
    }

    .top-label {
      font-family: "Cinzel", serif;
      font-size: .65rem;
      letter-spacing: .35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1.2s .3s ease forwards
    }

    .days-label {
      font-size: 1rem;
      color: var(--gl);
      font-style: italic;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 1.2s .6s ease forwards
    }

    .photo-wrap {
      position: relative;
      width: min(380px, 88vw);
      opacity: 0;
      animation: fadeUp 1.4s .9s ease forwards
    }

    .frame-border {
      position: absolute;
      inset: -14px;
      border: 1px solid var(--gold);
      pointer-events: none;
      z-index: 2
    }

    .frame-border::before {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(201, 168, 76, .3)
    }

    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid;
      z-index: 3
    }

    .corner.tl {
      top: -14px;
      left: -14px;
      border-width: 2px 0 0 2px
    }

    .corner.tr {
      top: -14px;
      right: -14px;
      border-width: 2px 2px 0 0
    }

    .corner.bl {
      bottom: -14px;
      left: -14px;
      border-width: 0 0 2px 2px
    }

    .corner.br {
      bottom: -14px;
      right: -14px;
      border-width: 0 2px 2px 0
    }

    .photo-img {
      display: block;
      width: 100%
    }

    .countdown-strip {
      margin-top: 38px;
      display: flex;
      gap: 20px;
      opacity: 0;
      animation: fadeUp 1.4s 1.2s ease forwards
    }

    .day-dot-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px
    }

    .day-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid var(--gold);
      background: transparent
    }

    .day-dot.passed {
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold)
    }

    .day-dot.today {
      background: var(--gl);
      animation: pdot 2s infinite
    }

    @keyframes pdot {

      0%,
      100% {
        box-shadow: 0 0 8px var(--gl)
      }

      50% {
        box-shadow: 0 0 20px var(--gl)
      }
    }

    .day-label {
      font-size: .6rem;
      color: rgba(201, 168, 76, .6);
      font-family: "Cinzel", serif;
      margin-top: 2px
    }

    .today-label {
      color: var(--gl) !important
    }

    .divider {
      width: 160px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 28px 0;
      opacity: 0;
      animation: fadeUp 1.4s 1.3s ease forwards
    }

    .message {
      font-size: 1.15rem;
      font-style: italic;
      color: var(--gl);
      text-align: center;
      line-height: 1.7;
      max-width: 340px;
      opacity: 0;
      animation: fadeUp 1.4s 1.5s ease forwards
    }

    .bday-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 2s .5s ease forwards
    }

    .bday-section.show {
      display: flex
    }

    .bday-heading {
      font-family: "Cinzel", serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      letter-spacing: .1em;
      line-height: 1.4;
      background: linear-gradient(90deg, #c9a84c 0%, #fff8e1 40%, #c9a84c 60%, #8b6914 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite
    }

    @keyframes shimmer {
      0% {
        background-position: -200% center
      }

      100% {
        background-position: 200% center
      }
    }

    .bday-sub {
      font-size: 1rem;
      font-style: italic;
      color: var(--gl);
      line-height: 1.7
    }

    .scan-box {
      border: 1px solid var(--gold);
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-width: 340px
    }

    .scan-hint {
      font-family: "Cinzel", serif;
      font-size: .72rem;
      letter-spacing: .15em;
      color: var(--gold);
      text-transform: uppercase;
      animation: ptxt 2s ease-in-out infinite;
      text-align: center
    }

    .scan-url {
      font-size: .9rem;
      color: var(--gl);
      word-break: break-all;
      text-align: center
    }

    @keyframes ptxt {

      0%,
      100% {
        opacity: .5
      }

      50% {
        opacity: 1
      }
    }

    .petal {
      position: fixed;
      opacity: 0;
      pointer-events: none;
      z-index: 0
    }

    @keyframes floatPetal {
      0% {
        transform: translateY(110vh) rotate(0deg);
        opacity: 0
      }

      10% {
        opacity: .7
      }

      90% {
        opacity: .5
      }

      100% {
        transform: translateY(-10vh) rotate(360deg);
        opacity: 0
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
  <script>
    // ---- DATES: change END_D to test birthday mode ----
    var START_D = new Date("2026-02-23T00:00:00");
    var END_D = new Date("2026-02-28T00:00:00");
    // To test birthday: change END_D to new Date("2026-02-23T00:00:00")
    // To go live:       change END_D back to new Date("2026-02-28T00:00:00")

    function todayMid() { var n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()) }
    function getProgress() { return Math.max(0, Math.min(1, (todayMid() - START_D) / (END_D - START_D))) }

    // Apply blur before first paint — prevents any flash of clear photo
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("thePhoto").style.filter = "blur(" + (18 * (1 - getProgress())) + "px)";
    });
  </script>
</head>

      <div class="bday-heading">Happy Birthday &#10024;</div>
      <div class="bday-sub">The wait is over, my love &#127800;</div>
      <div class="scan-box">

  <script>
    (function () {
      var c = document.getElementById("stars"), ctx = c.getContext("2d"), st = [];
      function rs() { c.width = innerWidth; c.height = innerHeight } rs();
      window.addEventListener("resize", rs);
      for (var i = 0; i < 100; i++)st.push({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.2 + .3, mo: Math.random() * .5 + .15, sp: Math.random() * .008 + .003, ph: Math.random() * Math.PI * 2 });
      function dr(t) { ctx.clearRect(0, 0, c.width, c.height); st.forEach(function (s) { var o = s.mo * (.5 + .5 * Math.sin(t * s.sp * 1000 + s.ph)); ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fillStyle = "rgba(232,213,163," + o + ")"; ctx.fill() }); requestAnimationFrame(dr) }
      requestAnimationFrame(dr);
    })();

    var DN = ["Feb 23", "Feb 24", "Feb 25", "Feb 26", "Feb 27", "Feb 28"];
    var MSG = ["Something beautiful is coming... just like you.", "Every day a little clearer, like how you light up my world.", "Getting closer... can you feel it?", "Almost there - just like how I feel when you're near.", "One more sleep... the best day is almost here."];

    function isBday() { return todayMid() >= END_D }
    function dIdx() { return Math.max(0, Math.min(Math.floor((todayMid() - START_D) / 864e5), DN.length - 1)) }

    function init() {
      document.getElementById("thePhoto").style.filter = "blur(" + (18 * (1 - getProgress())) + "px)";
      var dl = Math.ceil((END_D - todayMid()) / 864e5);
      document.getElementById("daysLabel").textContent = isBday() ? "Today is the day!" : (dl === 1 ? "one more day..." : dl + " days to go");
      var strip = document.getElementById("countdownStrip"), di = dIdx();
      DN.forEach(function (name, i) {
        var w = document.createElement("div"); w.className = "day-dot-wrap";
        var d = document.createElement("div"); d.className = "day-dot" + (i < di ? " passed" : i === di ? " today" : "");
        var l = document.createElement("div"); l.className = "day-label" + (i === di ? " today-label" : "");
        l.textContent = name; w.appendChild(d); w.appendChild(l); strip.appendChild(w);
      });
      if (isBday()) {
        document.getElementById("waitMessage").style.display = "none";
        document.getElementById("bdaySection").classList.add("show");
        spawnPetals();
      } else {
        document.getElementById("waitMessage").textContent = MSG[di] || "";
      }
    }

    function spawnPetals() {
      var e = ["*", "~", "o", "x", "+", "@"];
      function s() { var el = document.createElement("div"); el.className = "petal"; el.textContent = e[~~(Math.random() * e.length)]; el.style.left = (Math.random() * 100) + "vw"; el.style.color = "#c9a84c"; el.style.fontSize = (.9 + Math.random() * 1.2) + "rem"; var d = 6 + Math.random() * 5; el.style.animation = "floatPetal " + d + "s linear forwards"; document.body.appendChild(el); setTimeout(function () { el.remove() }, d * 1000) }
      for (var i = 0; i < 12; i++)setTimeout(s, i * 500);
      setInterval(s, 1200);
    }

    window.addEventListener("load", init);
  </script>
